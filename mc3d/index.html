<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0" /> -->
    <meta name="viewport" content="width=968" />
    <meta
      name="description"
      content="Curated set of computationally relaxed three-dimensional crystal structures based on raw data from experimental databases."
    />
    <title>Materials Cloud 3D crystals database</title>

    <!-- read public jsonld for better SEO indexing -->
    <script>
      fetch("/mc3d-organization-jsonld.json")
        .then((res) => res.json())
        .then((data) => {
          const script = document.createElement("script");
          script.type = "application/ld+json";
          script.text = JSON.stringify(data);
          document.head.appendChild(script);
        })
        .catch(console.error);
    </script>

    <!-- Plausible analytics -->
    <script type="text/javascript">
      var header = document.getElementsByTagName("head")[0];
      var plausible = document.createElement("script");
      var domain_name = window.location.hostname;
      var rollup_name = "plausible-rollup.materialscloud.org";

      plausible.async = "";
      plausible.defer = "";
      plausible.dataset["domain"] = domain_name + "," + rollup_name;
      plausible.src = "https://plausible.io/js/plausible.js";
      header.appendChild(plausible);
    </script>
    <!-- end Plausible analytics -->

    <script>
      // to maintain backwards compatibility with routes we drop #/ and convert it to
      if (window.location.hash && window.location.hash.startsWith("#/")) {
        const path = window.location.hash.slice(1);
        window.history.replaceState(null, "", path);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
